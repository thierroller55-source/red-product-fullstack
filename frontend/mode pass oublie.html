<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mode passe oublié</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-500 flex items-center justify-center min-h-screen font-sans">

    <div class="w-full max-w-md px-6">
        <!-- Logo et Titre -->
        <div class="flex items-center justify-center mb-8">
            <div class="bg-white p-1 mr-3 rounded-sm">
                <!-- Simulation du logo -->
                <svg class="w-6 h-6 text-[#454d55]" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z" />
                </svg>
            </div>
            <h1 class="text-white text-2xl font-bold tracking-wider">RED PRODUCT</h1>
        </div>

        <!-- Carte Blanche -->
        <div class="bg-white rounded shadow-2xl p-8 mb-6">
            <h2 class="text-gray-800 text-lg font-semibold mb-4">
                Mot de passe oublié?
            </h2>
            
            <p class="text-gray-600 text-sm leading-relaxed mb-8">
                Entrez votre adresse e-mail ci-dessous et nous vous envoyons des instructions sur la façon de modifier votre mot de passe.
            </p>

            <form id="forgotPasswordForm">
                <div class="mb-8">
                    <label for="email" class="block text-gray-400 text-sm mb-1">Votre e-mail</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        required
                        placeholder="nom@exemple.com"
                        class="w-full border-b border-gray-200 py-2 focus:outline-none focus:border-gray-500 text-gray-800 transition-colors"
                    >
                </div>

                <button 
                    type="submit" 
                    class="w-full bg-[#454d55] text-white py-3 rounded font-bold hover:bg-[#343a40] transition duration-200"
                >
                    Envoyer
                </button>
            </form>
        </div>

        <!-- Lien de retour -->
        <div class="text-center">
            <a href="se connecté.html" class="text-white text-base hover:underline">
                Revenir à la <span class="text-yellow-500 font-bold">connexion</span>
            </a>
        </div>
    </div>
    
    
    
    <script src="script.js"></script>
</body>
</html>
