<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reset-password </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-500 h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <h2 class="text-xl font-bold mb-6 text-center">Choisir un nouveau mot de passe</h2>

        <form id="resetPasswordForm" class="space-y-4">
            <input type="password" id="newPassword" placeholder="Nouveau mot de passe" required
                class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-black">

            <input type="password" id="confirmPassword" placeholder="Confirmer le mot de passe" required
                class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-black">

            <button type="submit" class="w-full bg-black text-white py-3 rounded-lg font-bold">
                Enregistrer le mot de passe
                
                <svg id="spinner" class="hidden w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="white" stroke-width="4" />
                    <path class="opacity-75" fill="white" d="M4 12a8 8 0 018-8v8z" />
                </svg>
            </button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('resetPasswordForm');
            if (form) form.addEventListener('submit', handleResetPassword);
        });
    </script>
    <script src="script.js"></script>
</body>

</html>
