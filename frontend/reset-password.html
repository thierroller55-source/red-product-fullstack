<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Nouveau mot de passe - RED PRODUCT</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <h2 class="text-xl font-bold mb-6 text-center">Choisir un nouveau mot de passe</h2>
        
        <form id="resetPasswordForm" class="space-y-4">
            <input type="password" id="newPassword" placeholder="Nouveau mot de passe" required
                   class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-black">
            
            <input type="password" id="confirmPassword" placeholder="Confirmer le mot de passe" required
                   class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-black">
            
            <button type="submit" class="w-full bg-black text-white py-3 rounded-lg font-bold">
                Enregistrer le mot de passe
            </button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
