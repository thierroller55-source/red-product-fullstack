<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S'inscrire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-500 flex items-center justify-center min-h-screen font-sans p-4">

    <div class="w-full max-w-md">
        <!-- Logo et Titre de l'application -->
        <div class="flex items-center justify-center mb-8">
            <div class="bg-white p-1 mr-3 rounded-sm">
                <!-- Icône SVG simulant le logo blanc de l'image -->
                <svg class="w-6 h-6 text-[#454d55]" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z" />
                </svg>
            </div>
            <h1 class="text-white text-2xl font-bold tracking-wider">RED PRODUCT</h1>
        </div>

        <!-- Carte Blanche du Formulaire -->
        <div class="bg-white rounded-md shadow-2xl p-8 mb-6">
            <h2 class="text-gray-600 text-sm mb-8">
                Inscrivez-vous en tant que Admin
            </h2>

            <form id="registrationForm" class="space-y-6">
                <!-- Champ Nom -->
                <div>
                    <label for="name" class="block text-gray-400 text-xs mb-1">Nom</label>
                    <input type="text" id="name" name="name" required
                        class="w-full border-b border-gray-200 py-2 focus:outline-none focus:border-gray-500 text-gray-800 transition-colors">
                </div>

                <!-- Champ Email -->
                <div>
                    <label for="email" class="block text-gray-400 text-xs mb-1">E-mail</label>
                    <input type="email" id="email" name="email" required
                        class="w-full border-b border-gray-200 py-2 focus:outline-none focus:border-gray-500 text-gray-800 transition-colors">
                </div>

                <!-- Champ Mot de passe -->
                <div class="relative">
                    <label for="password" class="block text-gray-400 text-xs mb-1">Mot de passe</label>

                    <input type="password" id="password" name="password" required
                        class="w-full border-b border-gray-200 py-2 pr-10 focus:outline-none focus:border-gray-500 text-gray-800 transition-colors">

                    <!-- Ce bouton va maintenant se placer par rapport à la div ci-dessus -->
                    <button type="button" onclick="togglePassword()"
                        class="absolute right-0 bottom-2 p-2 text-gray-400 hover:text-gray-600 transition-colors">
                        <svg id="eyeIcon" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2"
                            viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                    </button>
                </div>

                <!-- Case à cocher Termes et Conditions -->
                <div class="flex items-center space-x-3 pt-2">
                    <input type="checkbox" id="terms" required
                        class="w-5 h-5 rounded border-gray-300 text-[#454d55] focus:ring-0 cursor-pointer">
                    <label for="terms" class="text-gray-600 text-sm cursor-pointer">
                        <!-- Accepter les termes et la politique -->
                    </label>
                </div>

                <!-- Bouton S'inscrire -->
                <button type="submit"
                    class="w-full bg-[#454d55] text-white py-3 mt-4 rounded font-bold hover:bg-[#343a40] transition duration-200">
                    S'inscrire
                </button>
            </form>
        </div>

        <!-- Pied de page : Lien de connexion -->
        <div class="text-center">
            <p class="text-white text-sm">
                Vous avez déjà un compte?
                <a href="se connecté.html" class="text-yellow-500 font-bold text-base hover:underline ml-1">Se
                    connecter</a>
            </p>
        </div>
    </div>




    <script src="script.js"></script>
</body>

</html>
