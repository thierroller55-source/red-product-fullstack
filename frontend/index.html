<!DOCTYPE html>
<html lang="fr">
<head>
   <!-- 1. 🟢 BLOQUER LE FLASH : On rend la page invisible immédiatement -->
    <style>
        body { display: none !important; }
    </style>

    <!-- 2. 🟢 LE GARDIEN ULTRA-RAPIDE -->
    <script>
        (function() {
            const token = localStorage.getItem('token');
            const path = decodeURIComponent(window.location.pathname);
            
            // Si on n'a pas de badge sur une page privée, on éjecte IMMEDIATEMENT
            if (!token && !path.includes('se connecté') && !path.includes('inscription')) {
                window.location.replace('se connecté.html');
            }
        })();
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des hôtels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
</head>

<body class="bg-gray-100 h-screen flex overflow-hidden">
    
    <!-- ✅ Overlay mobile -->
    <div id="sidebarOverlay" onclick="fermerMenu()" class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden"></div>

     <!-- ✅ SIDEBAR — cachée sur mobile, visible sur lg -->
    <aside id="sidebar" class="w-48 bg-gray-700 flex flex-col justify-between py-6 px-4
               fixed top-0 left-0 h-full z-40
               transform -translate-x-full lg:translate-x-0
               transition-transform duration-300 ease-in-out">

        <!-- Logo -->
        <div>
            <div class="flex items-center gap-2 mb-6 px-1">
                <div class="w-6 h-6 bg-white rounded flex items-center justify-center shrink-0">
                    <svg class="w-3.5 h-3.5 text-black" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M17 3H7a2 2 0 00-2 2v16l7-3 7 3V5a2 2 0 00-2-2z" />
                    </svg>
                </div>
                <span class="text-white font-bold text-sm tracking-wide">RED PRODUCT</span>
            </div>

            <p class="text-gray-400 text-[10px] uppercase tracking-widest mb-2 px-1">Principal</p>

            <nav class="flex flex-col gap-1">
                <!-- Dashboard actif -->
                <a href="dashweb.html"
                    class="flex items-center gap-2.5 px-3 py-2 rounded-lg bg-[#555555] text-white text-xs font-medium">
                    <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <rect x="3" y="3" width="7" height="7" rx="1" stroke-width="2" />
                        <rect x="14" y="3" width="7" height="7" rx="1" stroke-width="2" />
                        <rect x="3" y="14" width="7" height="7" rx="1" stroke-width="2" />
                        <rect x="14" y="14" width="7" height="7" rx="1" stroke-width="2" />
                    </svg>
                    Dashboard
                </a>

                <a href="index.html"
                    class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-gray-300 hover:bg-[#555555] hover:text-white text-xs transition">
                    <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0H5m14 0h2M5 21H3" />
                    </svg>
                    Liste des hôtels
                </a>
            </nav>
        </div>

        <!-- Profil -->
        <div class="flex items-center gap-2.5 px-1">
            <div class="w-8 h-8 rounded-full overflow-hidden shrink-0 border-2 border-gray-500">
                <img src="image/propriete.png" alt="avatar" class="w-full h-full object-cover" />
            </div>
            <div>
                <p class="text-white text-xs font-semibold leading-tight">Mame Thierno Diouf</p>
                <p class="text-green-400 text-[10px] flex items-center gap-1 mt-0.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-green-400 inline-block"></span>
                    en ligne
                </p>
            </div>
        </div>
    </aside>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="flex-1 lg:ml-56 flex flex-col overflow-hidden">
        
        <!-- TOPBAR -->
        <header class="bg-white border-b h-16 flex items-center justify-between px-6 sticky top-0 z-30 shadow-sm">
            <div class="flex items-center gap-4">
                <button onclick="ouvrirMenu()" class="lg:hidden text-gray-600"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke-width="2"/></svg></button>
                <h1 class="text-lg font-bold text-gray-800">Liste des hôtels</h1>
            </div>

            <div class="flex items-center gap-5">
                <!-- Recherche -->
                <div class="relative hidden md:block">
                    <input type="text" id="searchInput" oninput="filterHotels()" placeholder="Rechercher..." class="pl-10 pr-4 py-1.5 bg-gray-100 border-none rounded-full text-xs w-48 focus:ring-2 focus:ring-gray-300 transition-all">
                    <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2"/></svg>
                </div>

                <!-- 🔔 Notifications -->
                <div class="relative">
                    <button id="notifBtn" class="relative text-gray-500 hover:text-gray-800 transition-colors pt-1">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" stroke-width="2"/></svg>
                        <span class="absolute -top-0.5 -right-0.5 bg-yellow-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-md hidden">0</span>
                    </button>
                    <!-- Menu Notifications -->
                    <div id="notifMenu" class="hidden absolute right-0 mt-3 w-72 bg-white rounded-xl shadow-2xl z-50 border border-gray-100 overflow-hidden">
                        <div class="p-3 border-b font-bold text-xs bg-gray-50 uppercase tracking-tighter">Notifications</div>
                        <div id="notifList" class="max-h-60 overflow-y-auto">
                            <!-- Rempli par le JS -->
                        </div>
                    </div>
                </div>

                <img src="image/propriete.png" class="w-8 h-8 rounded-full object-cover">
                
                <!-- Déconnexion -->
                <button onclick="seDeconnecter(event)" class="text-gray-400 hover:text-red-500 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" stroke-width="2"/></svg>
                </button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-6 md:p-8 bg-gray-50">
            <!-- Header Section -->
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
                <div class="flex items-center gap-3">
                    <h2 class="text-2xl font-light text-gray-700">Hôtels</h2>
                    <span id="hotelCount" class="text-2xl font-thin text-gray-400 border-l pl-3">0</span>
                </div>
                <button onclick="openModal()" class="bg-white border border-gray-300 px-5 py-2 rounded-xl text-sm font-bold text-gray-700 hover:bg-gray-100 transition shadow-sm">+ Créer un nouveau hôtel</button>
            </div>

            <!-- Grille des Hôtels -->
            <div id="hotelsGrid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-6 pb-24">
                <!-- Les cartes arrivent via script.js -->
            </div>

            <!-- Message Aucun Résultat -->
            <div id="noResult" class="hidden text-center py-20">
                <p class="text-gray-400 italic">Aucun hôtel trouvé pour cette recherche.</p>
            </div>
        </main>
    </div>

    <!-- ===== MODAL CRÉER UN HÔTEL (STYLE IMAGE 2) ===== -->
<div id="modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl w-full max-w-2xl shadow-2xl overflow-hidden">
        
        <!-- Header modal -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
            <h2 class="text-sm font-bold text-gray-700 uppercase tracking-widest">
                Créer un nouveau hôtel
            </h2>
            <button onclick="closeModal()"
                class="w-8 h-8 bg-gray-50 hover:bg-red-50 hover:text-red-500 rounded-full flex items-center justify-center text-gray-400 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                    <path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>

        <!-- Body modal -->
        <form id="addHotelForm" onsubmit="event.preventDefault(); addHotel();" class="p-6 flex flex-col gap-5">
            
            <!-- Ligne 1 : Nom + Adresse -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs text-gray-700 font-semibold">Nom de l'hôtel</label>
                    <input type="text" id="newNom" placeholder="Nom de l'hôtel" required
                        class="border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-200 transition" />
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs text-gray-700 font-semibold">Adresse</label>
                    <input type="text" id="newAdresse" placeholder="Les îles du saloum, Mar Lodj" required
                        class="border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-200 transition" />
                </div>
            </div>

            <!-- Ligne 2 : Email + Téléphone -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs text-gray-700 font-semibold">E-mail</label>
                    <input type="email" id="newEmail" placeholder="information@gmail.com" required
                        class="border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-200 transition" />
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs text-gray-700 font-semibold">Numéro de téléphone</label>
                    <input type="text" id="newTel" placeholder="+221 77 777 77 77" required
                        class="border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-200 transition" />
                </div>
            </div>

            <!-- Ligne 3 : Prix + Devise -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs text-gray-700 font-semibold">Prix par nuit</label>
                    <input type="text" id="newPrix" placeholder="25.000 XOF" required
                        class="border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-200 transition" />
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs text-gray-700 font-semibold">Devise</label>
                    <select id="newDevise"
                        class="border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-gray-200 bg-white transition cursor-pointer">
                        <option value="F XOF" selected>F XOF</option>
                        <option value="EUR">EUR</option>
                        <option value="USD">USD</option>
                    </select>
                </div>
            </div>

            <!-- Zone Photo -->
            <div class="flex flex-col gap-1.5">
                <label class="text-xs text-gray-700 font-semibold">Ajouter une photo</label>
                <div class="border-2 border-dashed border-gray-200 rounded-xl h-40 flex flex-col items-center justify-center cursor-pointer hover:bg-gray-50 transition relative overflow-hidden"
                    onclick="document.getElementById('photoInput').click()">
                    
                    <!-- Icône Paysage + Texte -->
                    <div id="uploadPlaceholder" class="flex flex-col items-center">
                        <svg class="w-12 h-12 text-gray-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        <p class="text-gray-400 text-sm font-medium">Ajouter une photo</p>
                    </div>

                    <input type="file" id="photoInput" accept="image/*" class="hidden" onchange="previewPhoto(event)" />
                    <!-- L'image de prévisualisation qui couvrira la zone une fois choisie -->
                    <img id="preview" src="" alt="preview" class="hidden absolute inset-0 w-full h-full object-cover" />
                </div>
            </div>

            <!-- Bouton Enregistrer -->
            <div class="flex justify-end mt-2">
                <button type="submit"
                    class="bg-[#343a40] hover:bg-black text-white text-sm font-bold px-12 py-3 rounded-lg transition shadow-md">
                    Enregistrer
                </button>
            </div>
        </form>
    </div>
</div>

    <!-- Chargement du script -->
    <script src="script.js"></script>
</body>
</html>
